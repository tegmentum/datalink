[package]
name = "petname-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `petname` extension (memorable random names via the petname crate), written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "petname_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
petname = "*"
