[package]
name = "isbn-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `isbn` extension: isbn_valid(text) -> boolean (ISBN-10/13 weighted checksum), isbn_normalize(text) -> text (digits-only canonical body, NULL if invalid). Hand-rolled, no crate. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "isbn_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
