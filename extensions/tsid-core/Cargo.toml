[package]
name = "tsid-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `tsid` extension (time-sorted unique IDs, Snowflake/TSID style: Crockford base-32 encode/decode + timestamp helpers): the logic + capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "tsid_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
