[package]
name = "unicodenorm-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `unicodenorm` extension (Unicode normalization NFC/NFD/NFKC/NFKD): the logic + capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "unicodenorm_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
unicode-normalization = "0.1"
