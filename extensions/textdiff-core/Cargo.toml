[package]
name = "textdiff-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `textdiff` extension (text diffing via the similar crate: unified diff, similarity ratio, changed-line count): the logic + capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "textdiff_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
similar = "2"
