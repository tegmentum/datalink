[package]
name = "color-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `color` extension (WCAG colour math: relative luminance + contrast ratio, parsing via csscolorparser): the logic + the capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "color_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
csscolorparser = "0.8"
