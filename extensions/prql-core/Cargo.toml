[package]
name = "prql-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `prql` PARSER extension: a transparent PRQL -> SQL transpiler (wraps prqlc with a target-dialect param), written ONCE. Consumed by BOTH the ducklink shim (duckdb:extension parser-dispatch) and the sqlink shim (sqlite:extension parse-on-failure intercept). The neutral `parse_prql(&str, Dialect) -> Outcome` compiles a PRQL pipeline to the target dialect's SQL; a `declare!` scalar `__sqlink_parse(text) -> text` adapts it to the sqlite side so the sqlink shim is generated by datalink-extcore's sqlite_shim! (the same scalar codegen the rest of the catalog uses). The ducklink side maps the same Outcome onto parser-dispatch.parse-outcome. This is the TRANSPARENT upgrade of the existing prql_to_sql scalar: `from x | filter ... | select ...` runs directly. NOTE: std (prqlc needs std); not no_std unlike ggsql/dplyr-core, but the declare!/sqlite_shim! path is unchanged."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "prql_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
prqlc = { version = "0.13", default-features = false }
