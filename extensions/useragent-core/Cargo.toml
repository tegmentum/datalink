[package]
name = "useragent-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `useragent` extension (User-Agent parsing via woothee): ua_browser / ua_browser_version / ua_os / ua_category -> text, ua_is_bot -> bool. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL -> NULL; unparseable -> UNKNOWN (woothee's best-effort)."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "useragent_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
woothee = "0.13"
