[package]
name = "uuidx-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `uuidx` extension (UUID extras complementing DuckDB's built-in v4 uuid()): uuid_v7() -> text (NONDETERMINISTIC; clock + wasi random), uuid_version(text) -> int64, uuid_timestamp(text) -> int64 (embedded unix-ms for v7/v1). Parse failures -> NULL. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "uuidx_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
uuid = { version = "1", features = ["v7"] }
