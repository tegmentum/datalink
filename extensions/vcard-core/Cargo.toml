[package]
name = "vcard-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `vcard` extension (vCard .vcf contact parsing via the ical crate): vcard_count(vcf) -> bigint, vcard_to_json(vcf) -> JSON array of {fn,email,tel,org}, vcard_names(vcf) -> JSON array. Written ONCE; the per-DB shim is generated by datalink-extcore. Parse error / non-text input -> NULL (never panics)."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "vcard_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
ical = "0.11"
serde_json = "1"
