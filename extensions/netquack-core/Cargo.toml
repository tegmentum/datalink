[package]
name = "netquack-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `netquack` extension (public-suffix-aware URL/domain parsing via the psl crate / Mozilla PSL), written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "netquack_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
psl = "2"
