[package]
name = "humantime-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `humantime` extension (human-friendly durations, via the humantime crate): humantime_parse(text) -> int64 seconds (NULL if unparseable), humantime_format(int64 seconds) -> text. NULL / negative -> NULL. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "humantime_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
humantime = "2"
