[package]
name = "vigenere-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `vigenere` extension (Vigenere polyalphabetic cipher): vigenere_encrypt(text, key) / vigenere_decrypt(text, key) -> text. Only letters are enciphered (case preserved); the key cycles over its letters only; NULL / empty key -> NULL. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "vigenere_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
