[package]
name = "math-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `math` extension's cross-dialect scalar functions. Only the functions NOT already provided as DuckDB/SQLite builtins are declared here (exp2, e, rand, div, truncate(x)/truncate(x,n)); the trig/log/rounding family lives in each DB's builtin math library. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "math_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
libm = "0.2"
