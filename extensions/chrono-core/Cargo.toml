[package]
name = "chrono-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `chrono` extension's cross-dialect datetime scalars. Only the dialect spellings NOT already provided as DuckDB builtins are declared here (the MySQL/BigQuery/Snowflake date/timestamp aliases + tz-convert + duration + business-day surface); year/month/day/date_part/date_trunc/date_diff/epoch/make_*/last_day/age/now/to_timestamp/... stay each DB's builtins. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "chrono_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# chrono 0.4 with serde-free + alloc support; std for chrono-tz interop
# (the IANA db generator relies on std::sync) and `clock` for now().
chrono = { version = "0.4", default-features = false, features = ["alloc", "std", "clock"] }
chrono-tz = { version = "0.10", default-features = false, features = ["std"] }
