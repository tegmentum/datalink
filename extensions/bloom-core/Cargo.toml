[package]
name = "bloom-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `bloom` extension (Bloom filter as an AGGREGATE build + membership scalar: bloom_filter(value) -> hex of an 8192-bit, k=5 filter; bloom_contains(filter, item) -> bool, no false negatives), written ONCE. The per-DB shim is generated by datalink-extcore. NULL inputs are skipped on build; a malformed/NULL filter yields NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "bloom_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
