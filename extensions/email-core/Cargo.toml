[package]
name = "email-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `email` extension (RFC-ish email validation/parsing via the email_address crate): email_validate -> bool, email_domain / email_local -> text. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL / invalid -> NULL (email_validate -> false)."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "email_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
email_address = "0.2"
