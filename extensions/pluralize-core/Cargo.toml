[package]
name = "pluralize-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `pluralize` extension: English inflection via the pluralizer crate. pluralize(word) -> text, singularize(word) -> text. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "pluralize_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
pluralizer = "0.4"
