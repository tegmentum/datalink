[package]
name = "quotedprintable-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `quotedprintable` extension: MIME quoted-printable via the quoted_printable crate. qp_encode(text) -> text, qp_decode(text) -> text (robust). Written ONCE; the per-DB shim is generated by datalink-extcore. NULL / non-UTF-8 decode -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "quotedprintable_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
quoted_printable = "*"
