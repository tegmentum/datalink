[package]
name = "html-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `html` extension (HTML parsing + CSS-selector extraction via scraper): html_extract(html, css) -> text of the first match, html_extract_all(html, css) -> JSON array of all matches, html_attr(html, css, attr) -> attribute value. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL / invalid selector / no match -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "html_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
scraper = "0.27"
