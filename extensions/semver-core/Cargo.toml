[package]
name = "semver-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `semver` extension (semantic-version parse/compare via the semver crate), written ONCE. The per-DB shim is generated by datalink-extcore. Pulls up ducklink's surface (semver_valid / semver_major / semver_minor / semver_patch / semver_compare). The sqlink port renamed validate (semver_validate) and added pre/build/max/satisfies/increment; that union (including the validate-name reconciliation) rides with the deferred sqlink shim."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "semver_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
semver = { version = "1.0", default-features = false }
