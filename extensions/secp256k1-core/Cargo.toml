[package]
name = "secp256k1-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `secp256k1` extension (ECDSA over secp256k1 via k256): secp256k1_pubkey(privkey) -> 33-byte compressed pubkey, secp256k1_sign(msg_hash, privkey) -> 64-byte compact RFC6979 sig, secp256k1_verify(msg_hash, sig, pubkey) -> bool. Written ONCE; the per-DB shim is generated by datalink-extcore. Malformed / NULL -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "secp256k1_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
k256 = { version = "0.13", default-features = false, features = ["ecdsa", "sha256", "std"] }
