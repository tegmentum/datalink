[package]
name = "h3-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `h3` extension (Uber H3 hexagonal geospatial indexing via h3o): h3_latlng_to_cell / h3_cell_to_parent / h3_grid_distance -> bigint, h3_cell_to_lat / h3_cell_to_lng -> double, h3_is_valid_cell -> boolean. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL / invalid input -> NULL (never panics)."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "h3_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
h3o = "0.10"
