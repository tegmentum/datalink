[package]
name = "ean-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `ean` extension (EAN-8 / UPC-A / EAN-13 barcode validation + check-digit + GS1 helpers), written ONCE. The per-DB shims are generated by datalink-extcore. Reconciles the drift to the 4-function superset: ducklink shipped ean_validate / ean_check_digit; this adds sqlink's ean_gs1_prefix + upca_to_ean13 so BOTH databases gain them. (The shared ean_check_digit keeps ducklink's any-length behaviour; sqlink's EAN-13-only variant is the documented residual drift handled with the deferred sqlink shim.)"
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "ean_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
