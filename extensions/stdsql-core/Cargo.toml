[package]
name = "stdsql-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `stdsql` cross-dialect scalar pack. Only the names DuckDB does NOT ship as builtins are declared here (space, initcap, the ClickHouse camelCase spellings startsWith/endsWith/lengthUTF8/lowerUTF8/upperUTF8/toString/empty/notEmpty/replaceAll/positionUTF8, and the PostgreSQL to_bin/to_oct/to_ascii/quote_ident/quote_literal/quote_nullable/get_byte/set_byte). DuckDB's own left/right/lpad/rpad/repeat/translate/to_hex/bit_length/chr/ascii/char_length/character_length/from_hex/get_bit/set_bit builtins and the variadic greatest/least are NOT re-registered. Logic lifted byte-for-byte from sqlink's stdsql so a future sqlite_shim! reproduces it. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "stdsql_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
