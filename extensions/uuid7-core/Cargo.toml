[package]
name = "uuid7-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `uuid7` extension (UUIDv7, RFC 9562, time-ordered: deterministic build / timestamp extract / validate): the logic + capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "uuid7_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
uuid = "1"
