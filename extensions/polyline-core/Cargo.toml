[package]
name = "polyline-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `polyline` extension: Google Encoded Polyline encode/decode via the polyline crate. polyline_encode(coords_json, precision) -> text, polyline_decode(encoded, precision) -> text. Coordinates are JSON arrays of [lon, lat] pairs. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL / invalid -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "polyline_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
polyline = "0.11"
geo-types = "0.7"
serde_json = "1"
