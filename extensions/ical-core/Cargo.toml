[package]
name = "ical-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `ical` extension (iCalendar .ics parsing via the ical crate): ical_event_count(ics) -> bigint, ical_to_json(ics) -> JSON array of {summary,dtstart,dtend,uid}, ical_summaries(ics) -> JSON array. Written ONCE; the per-DB shim is generated by datalink-extcore. Parse error / non-text input -> NULL (never panics)."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "ical_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
ical = "0.11"
serde_json = "1"
