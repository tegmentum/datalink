[package]
name = "passgen-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `passgen` extension (random password generation via rand + wasi entropy), written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "passgen_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
rand = "0.8"
