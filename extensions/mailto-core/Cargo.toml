[package]
name = "mailto-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `mailto` extension (RFC 6068 mailto: URI parsing via percent-encoding): mailto_to -> JSON recipient array, mailto_field(uri, name) -> percent-decoded header, mailto_to_json -> {to,subject,body,cc,bcc} JSON. Written ONCE; the per-DB shim is generated by datalink-extcore. Non-mailto / malformed / NULL -> NULL. Never panics."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "mailto_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
percent-encoding = "2.3"
