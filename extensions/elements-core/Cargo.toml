[package]
name = "elements-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `elements` extension (periodic-table lookups via mendeleev): the logic + the capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "elements_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
mendeleev = "*"
