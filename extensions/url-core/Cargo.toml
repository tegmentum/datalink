[package]
name = "url-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `url` extension (URL component extraction via the url crate): url_scheme / url_host / url_path / url_query -> text, url_port -> int64. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL / unparseable -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "url_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
url = "2.5"
