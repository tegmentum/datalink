[package]
name = "dplyr-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `dplyr` parser extension: a dplyr-pipeline -> SQL transpiler (filter/select/mutate/arrange/summarise/group_by), written ONCE. Consumed by BOTH the ducklink shim (duckdb:extension parser-dispatch) and the sqlink shim (sqlite:extension parse-on-failure intercept). The neutral `parse_dplyr(&str, &Dialect) -> Outcome` is the transpiler; a `declare!` scalar `__sqlink_parse(text) -> text` adapts it to the sqlite side so the sqlink shim is generated by datalink-extcore's sqlite_shim! (the same scalar codegen the rest of the catalog uses). The ducklink side maps the same Outcome onto parser-dispatch.parse-outcome. Engine differences (boolean literal spelling) ride the small Dialect param, exactly like ggsql-core."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "dplyr_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
