[package]
name = "timezone-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `timezone` extension (IANA timezone lookups via chrono-tz: validity, DST-aware UTC offset, abbreviation): the logic + capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "timezone_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
chrono = { version = "0.4", default-features = false, features = ["alloc", "std", "clock"] }
chrono-tz = { version = "0.10", default-features = false, features = ["std"] }
