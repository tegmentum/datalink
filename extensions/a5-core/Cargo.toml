[package]
name = "a5-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `a5` extension (A5 pentagonal DGGS / global geospatial index via the a5 crate): a5_lonlat_to_cell(lat, lon, resolution) -> int64, a5_cell_to_lat / a5_cell_to_lon(cell) -> float64, a5_cell_to_resolution, a5_cell_to_parent, a5_is_valid_cell, a5_cell_to_hex / a5_hex_to_cell. Written ONCE; the per-DB shim is generated by datalink-extcore. Cell ids are the u64 A5 index reinterpreted as int64. Invalid -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "a5_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
a5 = "0.9"
