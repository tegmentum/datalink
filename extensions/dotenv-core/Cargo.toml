[package]
name = "dotenv-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `dotenv` extension (hand-rolled .env parsing to JSON / key lookup, JSON via serde_json): the logic + the capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "dotenv_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
serde_json = "1"
