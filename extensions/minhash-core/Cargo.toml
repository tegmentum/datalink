[package]
name = "minhash-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `minhash` extension (MinHash set similarity as an AGGREGATE build + similarity scalar: minhash(value) -> hex of a 64-slot signature; minhash_similarity(a, b) -> estimated Jaccard), written ONCE. The per-DB shim is generated by datalink-extcore. NULL inputs skipped; a group with no usable values yields NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "minhash_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
