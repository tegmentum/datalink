[package]
name = "roman-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `roman` extension (Roman numeral encode/decode/validate), written ONCE. The per-DB shims are generated by datalink-extcore. Reconciles the drift to the 5-function union: ducklink shipped to_roman / from_roman (on the `roman` crate); sqlink shipped roman_encode / roman_decode / roman_validate (hand-rolled, case-insensitive, canonical-form-checked). The names do not collide, so the core exposes BOTH name families and each database gains the other's."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "roman_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# ducklink's to_roman / from_roman used this crate; preserved for parity.
roman = "0.1"
