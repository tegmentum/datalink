[package]
name = "pinyin-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `pinyin` extension: Chinese Hanzi -> pinyin romanization via the pinyin crate. to_pinyin (tone marks), to_pinyin_plain (no tones), to_pinyin_initials (first letter), all space-separated; non-Hanzi passes through. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "pinyin_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
pinyin = "0.11"
