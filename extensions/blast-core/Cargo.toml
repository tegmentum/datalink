[package]
name = "blast-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `blast` extension (BLASTN + BLASTP via rust-bio Smith-Waterman + Karlin-Altschul statistics), written ONCE. The per-DB shim is generated by `datalink_extcore::duckdb_shim!` — see synphage-ducklink/components/blast/ for the ducklink shim. JSON-string args (queries / subjects / options) reflect the DuckLink v5.0.0 boundary: LIST(STRUCT(...)) doesn't cross via the `duckdb:extension@4.0.0` contract's `complex` logical type, so callers pass JSON payloads directly."
license = "MIT"
repository = "https://github.com/tegmentum/tegmentum/datalink"

[lib]
name = "blast_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# rust-bio ships the exact algorithms we need — Smith-Waterman with affine
# gaps under bio::alignment::pairwise, and BLOSUM62 under bio::scores.
# Skip the default features whose transitive dependencies (statrs, ndarray)
# either don't compile to wasm32-wasip2 or bloat the .wasm needlessly.
bio = { version = "2.0", default-features = false }
# Complex-typed args (LIST(STRUCT(...)) queries + STRUCT options) cross the
# DuckLink boundary as JSON strings, so we need serde_json in-core to parse
# them. This forces std (serde_json needs alloc + std::io).
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
