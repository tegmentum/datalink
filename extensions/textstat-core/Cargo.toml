[package]
name = "textstat-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `textstat` extension (readability statistics: word/sentence/syllable count, Flesch reading ease, reading time): the logic + capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "textstat_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
