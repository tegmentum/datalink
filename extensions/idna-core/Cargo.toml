[package]
name = "idna-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `idna` extension (IDNA / punycode domain conversion, via the idna crate): idna_to_ascii(text) -> text (NULL on error), idna_to_unicode(text) -> text (best-effort). NULL -> NULL. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "idna_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
idna = "1.1"
