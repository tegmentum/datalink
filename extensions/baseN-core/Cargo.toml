[package]
name = "baseN-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `baseN` extension (compact base-N codecs: base32 RFC4648 no-pad, base58 Bitcoin alphabet, base64 standard) for BLOB<->TEXT, written ONCE. The per-DB shims are generated by datalink-extcore. Reconciles the pre-pullup drift to the 6-function superset (base32/base58 enc+dec, to_base64/from_base64) so BOTH databases gain base64. Decode errors return NULL (Option->Null) rather than raising, so SQL composition stays clean."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "baseN_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# Same crate features the pre-pullup extensions used (compat-registry):
# base32 with no default features; bs58 alloc-only; base64 alloc-only.
base32 = { version = "0.5", default-features = false }
bs58 = { version = "0.5", default-features = false, features = ["alloc"] }
base64 = { version = "0.22", default-features = false, features = ["alloc"] }
