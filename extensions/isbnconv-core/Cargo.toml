[package]
name = "isbnconv-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `isbnconv` extension: isbn10_to_13(text) and isbn13_to_10(text) (978-prefixed only) -> text, recomputing the check digit; invalid length -> NULL. Hand-rolled. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "isbnconv_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
