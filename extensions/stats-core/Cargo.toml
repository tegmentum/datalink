[package]
name = "stats-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `stats` statistical-aggregate pack. Only the percentile aggregates DuckDB does NOT expose as plain catalog aggregates are declared here: percentile(value, p), percentile_cont(value, p), percentile_disc(value, p) with p in 0..100. DuckDB's stddev/variance/median/mode/corr/covar/regr_*/skewness/kurtosis/bit_*/any_value/array_agg/string_agg aggregates are NOT re-registered (and its percentile_cont/disc are WITHIN GROUP ordered-set syntax, not these 2-arg names). Logic lifted byte-for-byte from sqlink's stats so a future sqlite_shim! reproduces it. Written ONCE; the per-DB aggregate shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "stats_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
