[package]
name = "aggstat-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `aggstat` extension (statistical AGGREGATES DuckDB core lacks: harmonic_mean(x)), written ONCE. The per-DB aggregate shim is generated by datalink-extcore. The fold (init/step/finalize) lives here as neutral logic; NULL and zero inputs are skipped, an empty group yields NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "aggstat_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
