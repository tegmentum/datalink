[package]
name = "text-utils-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `text-utils` extension's cross-dialect string scalars. Only the functions NOT already provided as DuckDB builtins are declared (sql_normalize, insert(MySQL), locate(2)/locate(3)); position/split_part/lcase/ucase/split/string_split/str_split/reverse are DuckDB builtins, and the eponymous `prefixes` table function stays DB-private. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "text_utils_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
