[package]
name = "countmin-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `countmin` extension (Count-Min sketch as an AGGREGATE build + frequency scalar: count_min(value) -> hex of a d=4 x w=512 counter table; cms_estimate(sketch, item) -> bigint, never an under-count), written ONCE. The per-DB shim is generated by datalink-extcore. NULL inputs skipped; a malformed sketch yields NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "countmin_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
