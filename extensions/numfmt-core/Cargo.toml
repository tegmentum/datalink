[package]
name = "numfmt-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `numfmt` extension (number formatting: comma thousands-grouping + SI/metric prefixes), written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "numfmt_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
