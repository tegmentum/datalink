[package]
name = "plist-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `plist` extension: Apple property-list (XML or binary) parsing via the plist crate. plist_to_json(data) -> text, plist_get(data, key) -> text. Written ONCE; the per-DB shim is generated by datalink-extcore. Parse error / absent key -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "plist_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
plist = "*"
serde_json = "*"
