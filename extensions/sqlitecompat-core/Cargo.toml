[package]
name = "sqlitecompat-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `sqlitecompat` cross-compat pack: SQLite built-in scalars that DuckDB does NOT ship (zeroblob, randomblob, likely, unlikely, likelihood). Single-direction: the per-DB shim is generated ONLY for ducklink (duckdb:extension), so DuckDB users get the SQLite-named/semantics functions. SQLite already has these as builtins, so no sqlink shim. Written ONCE via datalink-extcore; NULL -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "sqlitecompat_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
