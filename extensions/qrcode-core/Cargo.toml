[package]
name = "qrcode-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `qrcode` extension (QR code generation via the qrcode crate, SVG output): qr_svg(text) -> an SVG document. Written ONCE; the per-DB shim is generated by datalink-extcore. Data too large for a QR symbol -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "qrcode_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# Same crate features the pre-pullup extension used (compat-registry).
qrcode = { version = "0.14", default-features = false, features = ["svg"] }
