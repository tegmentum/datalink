[package]
name = "phonetic2-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `phonetic2` extension (nysiis + refined_soundex + double_metaphone via rphonetic), written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "phonetic2_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
rphonetic = "*"
