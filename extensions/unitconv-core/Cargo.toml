[package]
name = "unitconv-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `unitconv` extension (hand-rolled physical unit conversion): unit_convert(value, from, to) -> double over length, mass, and temperature; case-insensitive unit names. Written ONCE; the per-DB shim is generated by datalink-extcore. Unknown unit or cross-category conversion -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "unitconv_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
