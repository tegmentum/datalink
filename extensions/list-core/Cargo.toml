[package]
name = "list-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `list` extension's JSON-array-backed scalars. Only the names DuckDB does NOT ship as builtins are declared here (array_remove, list_length, the array_* reductions min/max/sum/product/avg/count, array_dims/lower/upper/ndims, array_positions, array_replace, arrays_overlap); the rich list_*/array_* native-LIST family stays DuckDB's builtins. Carrier is TEXT containing a JSON array. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "list_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
serde_json = "1"
