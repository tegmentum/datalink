[package]
name = "tdigest-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `tdigest` extension (t-digest quantile estimation as an AGGREGATE build + quantile/count scalars: tdigest(value) -> serialized sketch BLOB; tdigest_quantile(digest, q) -> double; tdigest_count(digest) -> bigint), written ONCE. The per-DB shim is generated by datalink-extcore. NULL inputs skipped; a malformed/NULL digest yields NULL; an empty group yields NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "tdigest_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# Same crate features the pre-pullup extension used (compat-registry).
tdigest = { version = "0.2", features = ["use_serde"] }
bincode = "1"
