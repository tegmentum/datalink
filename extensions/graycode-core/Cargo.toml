[package]
name = "graycode-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `graycode` extension (reflected binary Gray code: gray_encode / gray_decode over BIGINT), written ONCE. The per-DB shims are generated from this declaration by datalink-extcore. Negative / NULL input -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "graycode_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
