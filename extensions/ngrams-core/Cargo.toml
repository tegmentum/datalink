[package]
name = "ngrams-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `ngrams` extension (character / word n-grams emitted as a JSON array), written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "ngrams_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
serde_json = "1"
