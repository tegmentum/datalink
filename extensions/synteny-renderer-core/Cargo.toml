[package]
name = "synteny-renderer-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `synteny-renderer` extension (SVG synteny plot from tracks / features / links JSON payloads). Handwritten SVG generator — no external graphics crate. The per-DB shim is generated by `datalink_extcore::duckdb_shim!` — see synphage-ducklink/components/synteny-renderer/."
license = "MIT"
repository = "https://github.com/tegmentum/tegmentum/datalink"

[lib]
name = "synteny_renderer_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
