[package]
name = "iban-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `iban` extension (ISO 13616): iban_validate(text) -> boolean (ISO 7064 mod-97), iban_country(text) -> text (2-letter prefix), iban_bban(text) -> text. Hand-rolled. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "iban_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
