[package]
name = "piglatin-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `piglatin` extension: to_pig_latin(text) -> text moves each word's leading consonant cluster to the end and adds 'ay' ('way' for vowel-initial words), preserving the first letter's case. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "piglatin_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
