[package]
name = "crypto-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `crypto` extension (hash digests beyond DuckDB's built-in md5/sha256: sha1, sha512, sha3-256, blake3, crc32), written ONCE. The per-DB shim is generated by datalink-extcore. The input is hashed as UTF-8 bytes (TEXT) or raw bytes (BLOB); NULL -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "crypto_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# Same crate features the pre-pullup extension used (compat-registry).
sha1 = "0.10"
sha2 = "0.10"
sha3 = "0.10"
blake3 = "1"
crc32fast = "1"
