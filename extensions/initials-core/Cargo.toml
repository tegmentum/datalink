[package]
name = "initials-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `initials` extension: initials(text) -> first letter of each whitespace-separated word, uppercased; initials_dotted(text) -> the same joined with dots. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "initials_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
