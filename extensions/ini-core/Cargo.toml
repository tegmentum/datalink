[package]
name = "ini-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `ini` extension (INI / config parsing via rust-ini, bridged through serde_json): ini_to_json(text), ini_get(text, section, key), ini_sections(text). Invalid input / missing values -> NULL. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "ini_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
rust-ini = "0.21"
serde_json = "1"
