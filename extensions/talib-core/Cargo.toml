[package]
name = "talib-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `talib` technical-indicator pack (TA-Lib style). Window/aggregate indicators computed over the rows in the current frame: sma (simple moving average), ema (exponential moving average), rsi (relative strength index). Each is declared as an aggregate over an ordered frame, so the SAME core drives BOTH the ducklink (duckdb:extension) aggregate-as-window path (engine-resolved frames) AND the sqlink (sqlite:extension) streaming window path (step/value/inverse over create_window_function). Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "talib_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
