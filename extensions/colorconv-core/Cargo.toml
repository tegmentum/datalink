[package]
name = "colorconv-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `colorconv` extension (hand-rolled HSL/HSV <-> hex colour conversions): the algorithm + the capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "colorconv_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
