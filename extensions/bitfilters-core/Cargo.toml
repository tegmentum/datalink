[package]
name = "bitfilters-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `bitfilters` extension (Xor approximate-membership filter as an AGGREGATE build + membership scalar: xor_filter(value) -> serialized Xor8 BLOB over the distinct keys; xor_filter_contains(filter, value) -> bool, never a false negative), written ONCE. The per-DB shim is generated by datalink-extcore. NULL inputs skipped; a malformed/NULL filter yields NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "bitfilters_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# Same crate features the pre-pullup extension used (compat-registry).
xorf = { version = "0.12", features = ["serde"] }
bincode = "1"
