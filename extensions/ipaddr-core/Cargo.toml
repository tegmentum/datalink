[package]
name = "ipaddr-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `ipaddr` extension (IP validation/classification via std::net): ip_valid -> bool, ip_version -> int64 (4/6), ip_is_private -> bool (RFC1918 v4 / RFC4193 unique-local v6). Written ONCE; the per-DB shim is generated by datalink-extcore. NULL/invalid -> NULL (ip_valid/ip_is_private -> false)."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "ipaddr_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
