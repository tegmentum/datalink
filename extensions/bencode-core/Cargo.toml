[package]
name = "bencode-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `bencode` extension (BitTorrent bencode via serde_bencode): bencode_to_json(data) -> JSON text (byte-strings as UTF-8 or lowercase hex; dict keys canonically sorted), bencode_is_valid(data) -> bool. Written ONCE; the per-DB shim is generated by datalink-extcore. Never panics; bad input -> NULL / false."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "bencode_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
serde_bencode = "0.2"
serde_bytes = "0.11"
