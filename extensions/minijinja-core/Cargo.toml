[package]
name = "minijinja-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `minijinja` extension (Jinja2-style templating via the minijinja crate): jinja_render(template, context_json) -> text, jinja_valid(template) -> boolean. Written ONCE; the per-DB shim is generated by datalink-extcore. Invalid template / JSON / render -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "minijinja_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
minijinja = { version = "2", features = ["builtins", "macros", "serde"] }
serde_json = "1"
