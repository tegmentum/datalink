[package]
name = "humansize-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `humansize` extension (human-readable byte sizes via the humansize crate), written ONCE. The per-DB shim is generated by datalink-extcore. Pulls up ducklink's surface (humansize / humansize_binary); the sqlink port uses an entirely different name family (humansize_bytes / humansize_ibytes / humansize_duration / humansize_parse_*) with no name overlap, so that union rides with the deferred sqlink shim."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "humansize_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
humansize = "2"
