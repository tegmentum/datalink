[package]
name = "atbash-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `atbash` extension (Atbash substitution cipher): the algorithm + the capability declaration, written ONCE. Per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "atbash_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
