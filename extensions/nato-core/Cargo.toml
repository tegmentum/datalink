[package]
name = "nato-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `nato` extension (NATO phonetic alphabet spelling), written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "nato_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
