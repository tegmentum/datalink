[package]
name = "genome-format-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `genome-format` extension (GenBank parser: `genbank_scan(contents)` + `genbank_read_path(path)` producing a wide feature relation). Handwritten parser — no Biopython, no rust-bio io. The per-DB shim is generated by `datalink_extcore::duckdb_shim!` — see synphage-ducklink/components/genome-format/. `genbank_read_path` carries a `replacement_scan = [\"gb\", \"gbk\"]` attribute so DuckDB rewrites `SELECT * FROM 'lambda.gb'` to `genbank_read_path('lambda.gb')` at parse time."
license = "MIT"
repository = "https://github.com/tegmentum/tegmentum/datalink"

[lib]
name = "genome_format_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# In-crate JSON emission for qualifier maps (parser output field), plus
# serde derives for future callers.
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
