[package]
name = "jsonata-core-ext"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `jsonata` extension (JSONata query/transform language via the jsonata-core crate): jsonata(expr, json) -> text. Written ONCE; the per-DB shim is generated by datalink-extcore. The result is rendered back to a JSON string; an invalid expression, malformed JSON, or an evaluation error -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "jsonata_core_ext"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# simd-json (the crate's default) is x86/ARM SIMD-only; disable it so the pure
# serde_json path is used (wasm-portable). JSONata evaluation is unaffected.
jsonata-core = { version = "2.1", default-features = false }
