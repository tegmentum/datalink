[package]
name = "rapidfuzz-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `rapidfuzz` extension: fuzzy string matching via the rapidfuzz crate. fuzz_ratio(a,b) -> double (0..100), damerau_levenshtein / indel / osa (a,b) -> bigint edit distances. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL in either -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "rapidfuzz_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
rapidfuzz = "*"
