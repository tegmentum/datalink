[package]
name = "faker-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `faker` extension (fake data generation via the fake crate, bundled lists): fake_name, fake_email, fake_username, fake_city, fake_company -> text. NONDETERMINISTIC. Written ONCE; the per-DB shim is generated by datalink-extcore. The generators are declared nondeterministic so the optimizer will not fold them."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "faker_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# Same crate the pre-pullup extension used. getrandom rides the wasi
# backend on wasm32-wasip2 (target_os = "wasi") — no extra feature needed.
fake = "5"
