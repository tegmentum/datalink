[package]
name = "wordwrap-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `wordwrap` extension: word_wrap(text, width) -> text (greedy fill to `width` columns, newline separated; via the textwrap crate). NULL text -> NULL; non-positive width -> NULL. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "wordwrap_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
textwrap = "*"
