[package]
name = "idextra-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `idextra` extension (modern identifier generators): ksuid() (svix-ksuid) and cuid2() (cuid2) -> text, both NONDETERMINISTIC (wasi random + clock). Written ONCE; the per-DB shim is generated by datalink-extcore. The generators are declared nondeterministic so the optimizer will not fold them."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "idextra_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# Same crates the pre-pullup extension used.
cuid2 = "*"
svix-ksuid = "*"
