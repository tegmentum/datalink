[package]
name = "json_schema-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `json_schema` extension (JSON Schema validation via the jsonschema crate): json_schema_valid(schema, doc) -> boolean, json_schema_errors(schema, doc) -> text (JSON array of messages). NULL / unparseable -> NULL; never panics. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "json_schema_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# default-features = false drops the resolve-http feature (reqwest / network)
# that does not build for wasm32-wasip2.
jsonschema = { version = "0.46", default-features = false }
serde_json = "1"
