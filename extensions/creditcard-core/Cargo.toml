[package]
name = "creditcard-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `creditcard` extension (PAN validation + network detection + masking helpers), written ONCE. The per-DB shims are generated by datalink-extcore. Reconciles the drift to the 7-function union: ducklink shipped cc_validate / cc_network; sqlink shipped cc_validate / cc_type / cc_mask / cc_last4 / cc_bin / cc_normalize. The names don't collide except cc_validate (kept on ducklink's length+Luhn rule for byte-parity; sqlink's brand+Luhn variant is documented residual drift), so the core exposes BOTH and each database gains the other's helpers."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "creditcard_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
