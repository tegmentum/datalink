[package]
name = "pwstrength-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `pwstrength` extension: password-strength scoring via the passwords crate. password_score(pw) -> double (0-100), password_strength(pw) -> text (very weak..very strong). Written ONCE; the per-DB shim is generated by datalink-extcore. NULL -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "pwstrength_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
passwords = "*"
