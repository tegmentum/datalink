[package]
name = "jwt-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `jwt` extension (JWT segment decoding, base64url, NO signature verification): jwt_header / jwt_payload -> text (JSON). Written ONCE; the per-DB shim is generated by datalink-extcore. Malformed / NULL -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "jwt_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
base64 = "0.22"
