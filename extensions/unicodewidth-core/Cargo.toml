[package]
name = "unicodewidth-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `unicodewidth` extension (grapheme cluster count + terminal display width): the logic + capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "unicodewidth_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
unicode-segmentation = "1.13"
unicode-width = "0.2"
