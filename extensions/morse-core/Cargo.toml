[package]
name = "morse-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `morse` extension (International Morse code encode/decode), written ONCE. The per-DB shims are generated by datalink-extcore. Surface (morse_encode / morse_decode) matches both ports; the core adopts ducklink's drop-unknown-characters behaviour (the sqlink port substitutes '?' for unknown chars -- a documented behavioural drift whose cross-DB reconciliation rides with the deferred sqlink shim)."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "morse_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
