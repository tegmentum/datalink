[package]
name = "textplot-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `textplot` extension (text/terminal visualization: unicode sparkline, multi-line bar chart, UTF-8 QR code): the logic + capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "textplot_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
serde_json = "1"
qrcode = "0.14"
