[package]
name = "uuid5-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `uuid5` extension (namespace UUIDs: uuid_v5 / uuid_v3): the logic + capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "uuid5_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
uuid = { version = "1", features = ["v3", "v5"] }
