[package]
name = "natsort-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `natsort` extension (natural-order string comparison via natord), written ONCE. The per-DB shims are generated by datalink-extcore. The two ports' natsort_compare DRIFTED in semantics (ducklink: case-sensitive natord; sqlink: case-insensitive with leading-zero tie-breaks), so this core adopts ducklink's behaviour for byte-parity; the cross-DB semantic reconciliation plus sqlink's natsort_key / natsort_less extras ride with the deferred sqlink shim."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "natsort_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
natord = "1.0"
