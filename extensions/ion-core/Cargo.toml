[package]
name = "ion-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `ion` extension (Amazon Ion <-> JSON via ion-rs): ion_to_json(text), ion_from_json(text), ion_get(text, field). NULL / parse error -> NULL; never panics. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "ion_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
ion-rs = "1.0"
serde_json = "1"
