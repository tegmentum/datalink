[package]
name = "ggsql-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `ggsql` parser extension: the VISUALIZE statement parse/rewrite logic, written ONCE. Consumed by BOTH the ducklink shim (duckdb:extension parser-dispatch) and the sqlink shim (sqlite:extension parse-on-failure intercept). The neutral `parse_visualize(&str) -> Outcome` is the rewrite engine; a `declare!` scalar `__sqlink_parse(text) -> text` adapts it to the sqlite side so the sqlink shim is generated by datalink-extcore's sqlite_shim! (the same scalar codegen the rest of the catalog uses). The ducklink side maps the same Outcome onto parser-dispatch.parse-outcome in a thin hand-written shim (a parser-dispatch codegen template is the documented follow-on)."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "ggsql_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
