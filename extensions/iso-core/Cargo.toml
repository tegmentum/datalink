[package]
name = "iso-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `iso` extension (ISO 3166 country lookups by alpha-2, via rust_iso3166): iso_country_name / iso_country_alpha3 / iso_country_numeric. Unknown code / NULL -> NULL. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "iso_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
rust_iso3166 = "0.1"
