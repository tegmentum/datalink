[package]
name = "stochastic-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `stochastic` extension (probability-distribution PDF/PMF, CDF and inverse-CDF scalars via `statrs`): the logic + the capability declaration, written ONCE."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "stochastic_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
statrs = "0.18"
