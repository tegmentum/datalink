[package]
name = "pluscode-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `pluscode` extension: Open Location Code (plus codes) via the open-location-code crate. pluscode_encode(lat, lon, length) -> text, pluscode_valid(code) -> bool, pluscode_decode_lat / pluscode_decode_lon(code) -> double (area center). Written ONCE; the per-DB shim is generated by datalink-extcore. Invalid -> NULL/false."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "pluscode_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
open-location-code = "*"
geo = "0.4"
