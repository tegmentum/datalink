[package]
name = "tera-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `tera` extension (Jinja2/Django-style templating via the tera crate): tera_render(template, context_json) -> text, tera_valid(template) -> boolean. Written ONCE; the per-DB shim is generated by datalink-extcore. Invalid template / JSON / render -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "tera_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
tera = { version = "1", default-features = false }
serde_json = "1"
