[package]
name = "geohash-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `geohash` extension (geohash encode/decode via the geohash crate): geohash_encode(lat, lon, precision) -> text, geohash_decode_lat / geohash_decode_lon(hash) -> float64. Written ONCE; the per-DB shim is generated by datalink-extcore. NULL / invalid -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "geohash_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
geohash = "0.13"
