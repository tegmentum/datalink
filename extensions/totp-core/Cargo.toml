[package]
name = "totp-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `totp` extension (RFC 6238 TOTP via HMAC-SHA1 over base32 secrets): totp(secret_base32, unix_time, period, digits) -> text. Written ONCE; the per-DB shim is generated by datalink-extcore. Deterministic given an explicit time; NULL / bad secret -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "totp_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
hmac = "0.12"
sha1 = "0.10"
base32 = "0.5"
