[package]
name = "vssfns-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `vssfns` extension (the genuinely-missing vector math from vss; L2/cosine/dot already live in core_functions): vec_l1_distance / vec_linf_distance(a, b) -> double and vec_normalize(a) -> text, with vectors passed as JSON number arrays in VARCHAR. NULL / bad JSON / length mismatch / non-finite -> NULL. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "vssfns_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
serde_json = "1"
