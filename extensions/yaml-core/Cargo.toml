[package]
name = "yaml-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `yaml` extension (YAML <-> JSON via serde_yaml bridged through serde_json::Value): yaml_to_json(yaml) -> json, json_to_yaml(json) -> yaml. Written ONCE; the per-DB shim is generated by datalink-extcore. Invalid input -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "yaml_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
serde_yaml = "0.9"
serde_json = "1"
