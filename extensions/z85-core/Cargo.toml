[package]
name = "z85-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `z85` extension (Z85 / ZeroMQ Base85 codec): z85_encode(hex) -> text and z85_decode(text) -> hex. Invalid input -> NULL. Written ONCE; the per-DB shim is generated by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "z85_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
z85 = "*"
