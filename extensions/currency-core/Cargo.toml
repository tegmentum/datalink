[package]
name = "currency-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `currency` extension (ISO 4217 currency lookups via iso_currency): the logic + the capability declaration, written ONCE. The per-DB shims are generated from this declaration by datalink-extcore."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "currency_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
iso_currency = "0.5"
