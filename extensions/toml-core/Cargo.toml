[package]
name = "toml-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `toml` extension (TOML <-> JSON via the toml crate bridged through serde_json::Value): toml_to_json(toml) -> json, json_to_toml(json) -> toml. Written ONCE; the per-DB shim is generated by datalink-extcore. Invalid input -> NULL."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "toml_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
toml = "0.9"
serde_json = "1"
