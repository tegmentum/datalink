[package]
name = "ids-core"
version = "0.1.0"
edition = "2021"
description = "Neutral, DB-agnostic core for the `ids` extension (identifier generators): ulid() and nanoid() -> text (NONDETERMINISTIC, use wasi random+clock), plus ulid_timestamp(ulid) -> epoch ms. Written ONCE; the per-DB shim is generated by datalink-extcore. The generators are declared nondeterministic so the optimizer will not fold them."
license = "MIT"
repository = "https://github.com/tegmentum/datalink"

[lib]
name = "ids_core"
path = "src/lib.rs"

[dependencies]
datalink-extcore = { path = "../../crates/datalink-extcore" }
# Same crates the pre-pullup extension used. getrandom rides the wasi
# backend on wasm32-wasip2 (target_os = "wasi") — no extra feature needed.
ulid = "1"
nanoid = "0.5"
